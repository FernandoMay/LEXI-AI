[build]
  publish = "deploy"
  command = "cd flutter && flutter build web --release --base-href=/app/ && cd .. && if not exist deploy mkdir deploy && if not exist deploy\\app mkdir deploy\\app && copy /Y flutter\\web\\landing.html deploy\\index.html && xcopy /E /Y flutter\\build\\web deploy\\app\\"

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
