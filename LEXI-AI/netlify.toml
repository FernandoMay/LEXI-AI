[build]
  publish = "flutter/build/web"
  command = "cd flutter && flutter build web --release && copy /Y web\\landing.html build\\web\\landing.html"

[[redirects]]
  from = "/landing.html"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
